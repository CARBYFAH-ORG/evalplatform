<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EvalPlatform</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { font-family: 'Inter', sans-serif; }
    .card-hover { transition: all 0.3s; }
    .card-hover:hover { transform: translateY(-4px); box-shadow: 0 20px 40px rgba(0,0,0,0.3); }
  </style>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen flex items-center justify-center p-4">

  <div class="max-w-lg w-full text-center">
    <!-- Logo -->
    <div class="w-20 h-20 bg-green-500/10 rounded-2xl flex items-center justify-center mx-auto mb-6">
      <svg class="w-10 h-10 text-green-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/>
      </svg>
    </div>
    <h1 class="text-3xl font-bold mb-2">EvalPlatform</h1>
    <p class="text-gray-400 mb-10">Plataforma de evaluación diagnóstica Pre/Post Test</p>

    <!-- Alumno -->
    <a href="./eval/" class="card-hover block bg-gray-800 border-2 border-gray-700 hover:border-green-500 rounded-2xl p-6 mb-4 text-left">
      <div class="flex items-center gap-4">
        <div class="w-14 h-14 bg-green-500/10 rounded-xl flex items-center justify-center flex-shrink-0">
          <span class="text-3xl">📝</span>
        </div>
        <div class="flex-1">
          <h2 class="text-lg font-bold text-green-400">Soy Alumno</h2>
          <p class="text-gray-400 text-sm">Entrar a una evaluación con mi código de acceso</p>
        </div>
        <svg class="w-5 h-5 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
      </div>
    </a>

    <!-- Maestro -->
    <a href="./creator/" class="card-hover block bg-gray-800 border-2 border-gray-700 hover:border-blue-500 rounded-2xl p-6 mb-4 text-left">
      <div class="flex items-center gap-4">
        <div class="w-14 h-14 bg-blue-500/10 rounded-xl flex items-center justify-center flex-shrink-0">
          <span class="text-3xl">🎓</span>
        </div>
        <div class="flex-1">
          <h2 class="text-lg font-bold text-blue-400">Soy Maestro</h2>
          <p class="text-gray-400 text-sm">Crear evaluaciones y gestionar preguntas</p>
        </div>
        <svg class="w-5 h-5 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
      </div>
    </a>

    <!-- Dashboard -->
    <a href="./dashboard/" class="card-hover block bg-gray-800 border-2 border-gray-700 hover:border-purple-500 rounded-2xl p-6 text-left">
      <div class="flex items-center gap-4">
        <div class="w-14 h-14 bg-purple-500/10 rounded-xl flex items-center justify-center flex-shrink-0">
          <span class="text-3xl">📊</span>
        </div>
        <div class="flex-1">
          <h2 class="text-lg font-bold text-purple-400">Resultados</h2>
          <p class="text-gray-400 text-sm">Ver dashboard comparativo Pre vs Post Test</p>
        </div>
        <svg class="w-5 h-5 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
      </div>
    </a>

    <p class="text-gray-600 text-xs mt-8">EvalPlatform — CARBYFAH-ORG</p>
  </div>

</body>
</html>
